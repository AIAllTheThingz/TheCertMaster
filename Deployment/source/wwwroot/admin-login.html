<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheCertMaster Admin Sign-In</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #d3d6db;
            --panel: rgba(211, 214, 219, 0.9);
            --text: #303841;
            --muted: #3a4750;
            --accent: #be3144;
            --accent-hover: #9f2638;
            --border: rgba(48, 56, 65, 0.16);
            --shadow: rgba(48, 56, 65, 0.18);
            --success-bg: #ecfdf3;
            --success-text: #166534;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(190, 49, 68, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(58, 71, 80, 0.24), transparent 26%),
                linear-gradient(180deg, #dfe2e6 0%, var(--bg) 52%, #c5c9cf 100%);
            color: var(--text);
        }

        .panel {
            width: min(520px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 26px 54px var(--shadow);
            padding: 1.75rem;
            backdrop-filter: blur(10px);
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 0.85rem;
            padding: 0.35rem 0.8rem;
            border-radius: 999px;
            background: rgba(190, 49, 68, 0.14);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 0.65rem;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.05;
        }

        p {
            margin: 0 0 1rem;
            color: var(--muted);
            line-height: 1.65;
        }

        label {
            display: block;
            margin-top: 0.9rem;
            font-weight: 700;
        }

        input, button {
            width: 100%;
            margin-top: 0.45rem;
            padding: 0.85rem 0.95rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            font-size: 1rem;
        }

        input {
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
        }

        button {
            margin-top: 1.15rem;
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-top: 1.15rem;
        }

        .links a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }

        #status {
            margin-top: 1rem;
            padding: 0.95rem 1rem;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.6);
            color: var(--muted);
            white-space: pre-wrap;
        }

        #status.success {
            background: var(--success-bg);
            color: var(--success-text);
        }

        #status.error {
            background: var(--error-bg);
            color: var(--error-text);
        }
    </style>
</head>
<body>
    <main class="panel">
        <div class="eyebrow">TheCertMaster Admin</div>
        <h1>Sign in to the protected admin dashboard.</h1>
        <p>Use an account with the <strong>Admin</strong> role. After a successful sign-in, you will be taken to the protected management console.</p>

        <form id="loginForm">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="username" required />

            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" required />

            <button type="submit">Open Admin Dashboard</button>
        </form>

        <div id="status" role="status" aria-live="polite">Sign in with an admin account to continue.</div>

        <div class="links">
            <a href="/">Home</a>
            <a href="/account.html">Account</a>
            <a href="/quiz.html">Quiz</a>
        </div>
    </main>

    <script>
        const adminTokenCookieName = "TheCertMasterAdminToken";
        const loginForm = document.getElementById("loginForm");
        const statusBox = document.getElementById("status");

        function setStatus(message, tone = "") {
            statusBox.className = tone || "";
            statusBox.textContent = message;
        }

        function setAdminTokenCookie(value) {
            const secureFlag = window.location.protocol === "https:" ? "; Secure" : "";
            document.cookie = `${adminTokenCookieName}=${encodeURIComponent(value)}; Path=/; SameSite=Lax${secureFlag}`;
        }

        function getAdminTokenCookie() {
            const match = document.cookie
                .split("; ")
                .find(value => value.startsWith(`${adminTokenCookieName}=`));
            return match ? decodeURIComponent(match.substring(adminTokenCookieName.length + 1)) : "";
        }

        async function ensureExistingSession() {
            const token = localStorage.getItem("jwtToken") || getAdminTokenCookie();
            if (!token) {
                return;
            }

            try {
                const res = await fetch("/api/account/me", {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (!res.ok) {
                    return;
                }

                const profile = await res.json();
                const role = profile.Role || profile.role || "";
                if (role === "Admin") {
                    localStorage.setItem("jwtToken", token);
                    setAdminTokenCookie(token);
                    window.location.replace("/manage.html");
                }
            } catch {
            }
        }

        loginForm.addEventListener("submit", async event => {
            event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            setStatus("Signing in...");

            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({ email, password })
                });

                const text = await res.text();
                let payload = {};
                if (text) {
                    try {
                        payload = JSON.parse(text);
                    } catch {
                        payload = { message: text };
                    }
                }

                if (!res.ok) {
                    setStatus(payload.message || payload.Message || text || "Sign-in failed.", "error");
                    return;
                }

                const token = payload.token || "";
                if (!token) {
                    setStatus("Sign-in succeeded, but no admin token was returned.", "error");
                    return;
                }

                localStorage.setItem("jwtToken", token);
                setAdminTokenCookie(token);
                setStatus("Sign-in successful. Opening the admin dashboard...", "success");
                window.location.replace("/manage.html");
            } catch (error) {
                setStatus(error.message || "Unable to sign in right now.", "error");
            }
        });

        ensureExistingSession();
    </script>
</body>
</html>
