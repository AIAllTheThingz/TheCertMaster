<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz Runner</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #1d4ed8;
            --accent-hover: #1e40af;
            --accent-soft: #dbeafe;
            --border: #d1d5db;
            --shadow: rgba(15, 23, 42, 0.08);
            --success-bg: #ecfdf3;
            --success-text: #166534;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px 16px 48px;
            background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
            color: var(--text);
        }

        .wrap {
            max-width: 920px;
            margin: 0 auto;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 1rem;
            padding: 0.35rem 0.8rem;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: 2rem;
        }

        .lead {
            margin: 0 0 1rem;
            color: var(--muted);
            line-height: 1.7;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            margin: 12px 0;
            box-shadow: 0 18px 40px var(--shadow);
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        label {
            font-size: 14px;
            color: #334155;
            font-weight: 600;
        }

        input[type="text"], select {
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            min-width: 260px;
        }

        button {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .muted {
            color: var(--muted);
        }

        .qtext {
            font-size: 18px;
            margin: 0 0 10px;
        }

        .progress {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .answers {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .answer {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #dbe4f0;
            background: #f8fafc;
        }

        .answer input {
            margin-top: 3px;
        }

        .pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            border: 1px solid #bfdbfe;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
        }

        .imggrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin: 12px 0 0;
        }

        .imggrid img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #dbe4f0;
            background: #fff;
        }

        .result {
            font-size: 18px;
        }

        .ok {
            color: var(--success-text);
        }

        .bad {
            color: var(--error-text);
        }

        a {
            color: var(--accent);
        }

        .toplinks {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin: 0 0 1.25rem;
        }

        #status {
            margin-top: 10px;
            padding: 0.9rem 1rem;
            border-radius: 14px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e3a8a;
            line-height: 1.6;
        }

        #status.error {
            background: var(--error-bg);
            border-color: #fecaca;
            color: var(--error-text);
        }

        .divider {
            border: 0;
            border-top: 1px solid #e5e7eb;
            margin: 14px 0;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="eyebrow">DevQuizAPI Quiz Runner</div>
        <h1>Quiz Runner</h1>
        <p class="lead">
            Choose a category, load an available quiz, and work through exam-style questions with image support and
            per-question feedback at the end.
        </p>
        <div class="toplinks">
            <a href="/">Open Landing Page</a>
            <a href="/upload.html">Open Admin Panel</a>
            <a href="/swapi.html">Open Swagger API</a>
        </div>

        <div class="card" id="pickerCard">
            <div class="row">
                <div>
                    <label for="categorySelect">Category</label><br />
                    <select id="categorySelect"></select>
                </div>

                <div>
                    <label for="quizSelect">Choose a quiz</label><br />
                    <select id="quizSelect"></select>
                </div>

                <div style="margin-top: 18px;">
                    <button id="btnLoad">Load quiz</button>
                    <!--<button id="btnRestart" disabled>Restart (re-randomize)</button>-->
                </div>
            </div>
            <div id="status" role="status" aria-live="polite"></div>
        </div>

        <div class="card" id="quizCard" style="display:none;">
            <div class="progress">
                <div>
                    <div class="muted" id="quizTitle"></div>
                    <div><span class="pill" id="qCounter">Question</span></div>
                </div>
                <div class="row">
                    <button id="btnPrev">← Prev</button>
                    <button id="btnNext">Next →</button>
                    <button id="btnRestart" disabled>Restart (re-randomize)</button>
                    <button id="btnSubmit">Submit</button>
                    <button id="btnNewQuiz" disabled>Select New Quiz</button>
                </div>
            </div>

            <hr class="divider" />

            <div id="questionArea"></div>
        </div>

        <div class="card" id="resultCard" style="display:none;">
            <div class="result" id="resultText"></div>
            <div class="muted" id="resultDetail" style="margin-top: 8px;"></div>
            <div style="margin-top: 12px;" id="perQuestion"></div>
        </div>
    </div>

    <script>
        // The API is configured to preserve C# property casing (PascalCase).
        // Normalize JSON keys to camelCase so the UI works regardless of serializer settings.
        function toCamelKey(k) {
            if (!k || typeof k !== 'string') return k;
            return k.length === 1 ? k.toLowerCase() : (k[0].toLowerCase() + k.slice(1));
        }
        function normalizeKeys(x) {
            if (Array.isArray(x)) return x.map(normalizeKeys);
            if (x && typeof x === 'object') {
                const o = {};
                for (const [k, v] of Object.entries(x)) o[toCamelKey(k)] = normalizeKeys(v);
                return o;
            }
            return x;
        }

        const api = {
            listCategories: () =>
                fetch('/api/categories')
                    .then(r => r.ok ? r.json() : Promise.reject(r)),

            listQuizzes: (category) => {
                const url = category && category !== 'All'
                    ? (`/api/quiz?category=${encodeURIComponent(category)}`)
                    : '/api/quiz';

                return fetch(url)
                    .then(r => r.ok ? r.json() : Promise.reject(r))
                    .then(normalizeKeys);
            },

            randomized: (quizId) =>
                fetch(`/api/quiz/${quizId}/random`)
                    .then(r => r.ok ? r.json() : Promise.reject(r))
                    .then(normalizeKeys),

            submit: (quizId, payload) =>
                fetch(`/api/quiz/${quizId}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                    .then(r => r.ok ? r.json() : Promise.reject(r))
                    .then(normalizeKeys)
        };

        const el = (id) => document.getElementById(id);
        const categorySelect = el('categorySelect');
        const quizSelect = el('quizSelect');
        const pickerCard = el('pickerCard');
        const status = el('status');
        const quizCard = el('quizCard');
        const btnNewQuiz = el('btnNewQuiz');
        const resultCard = el('resultCard');
        const questionArea = el('questionArea');
        const quizTitle = el('quizTitle');
        const qCounter = el('qCounter');
        const btnLoad = el('btnLoad');
        const btnRestart = el('btnRestart');
        const btnPrev = el('btnPrev');
        const btnNext = el('btnNext');
        const btnSubmit = el('btnSubmit');
        const resultText = el('resultText');
        const resultDetail = el('resultDetail');
        const perQuestion = el('perQuestion');

        let currentQuizId = null;
        let quizDto = null;
        let index = 0;
        const selections = new Map(); // Map<QuestionId, Set<AnswerId>>

        function setStatus(msg, tone = "info") {
            status.className = tone === "error" ? "error" : "";
            status.textContent = msg;
        }

        function guidFromQuery() {
            const p = new URLSearchParams(window.location.search);
            return p.get('quizId');
        }

        function normalizeQuizList(quizzes) {
            return (quizzes || []).map(q => ({
                id: q.Id ?? q.id,
                title: q.Title ?? q.title,
                createdUtc: q.CreatedUtc ?? q.createdUtc
            }));
        }

        function normalizeQuiz(dto) {
            if (!dto) return null;
            const questionsRaw = dto.Questions ?? dto.questions ?? [];
            return {
                quizId: dto.QuizId ?? dto.quizId,
                title: dto.Title ?? dto.title,
                questions: questionsRaw.map(q => {
                    const answersRaw = q.Answers ?? q.answers ?? [];
                    const imagesRaw = q.Images ?? q.images ?? [];
                    return {
                        id: q.QuestionId ?? q.questionId,
                        text: q.Text ?? q.text,
                        allowMultiple: q.AllowMultiple ?? q.allowMultiple,
                        answers: answersRaw.map(a => ({
                            id: a.AnswerId ?? a.answerId,
                            text: a.Text ?? a.text
                        })),
                        images: imagesRaw.map(i => ({
                            fileName: i.FileName ?? i.fileName,
                            url: i.Url ?? i.url
                        }))
                    };
                })
            };
        }

        function fillCategorySelect(categories) {
            categorySelect.innerHTML = '';

            const all = document.createElement('option');
            all.value = 'All';
            all.textContent = 'All';
            categorySelect.appendChild(all);

            for (const c of categories) {
                if (!c || typeof c !== 'string') continue;
                if (c.toLowerCase() === 'all') continue;
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                categorySelect.appendChild(opt);
            }
        }

        function fillQuizSelect(quizzes) {
            quizSelect.innerHTML = '';
            const opt0 = document.createElement('option');
            opt0.value = '';
            opt0.textContent = '— select —';
            quizSelect.appendChild(opt0);

            for (const q of quizzes) {
                const opt = document.createElement('option');
                opt.value = q.id;
                opt.textContent = q.title;
                quizSelect.appendChild(opt);
            }
        }

        function getSelectedQuizId() {
            return quizSelect.value;
        }

        function ensureSet(questionId) {
            if (!selections.has(questionId)) selections.set(questionId, new Set());
            return selections.get(questionId);
        }

        function escapeHtml(s) {
            return (s ?? '').toString()
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function renderQuestion() {
            if (!quizDto || !quizDto.questions || quizDto.questions.length === 0) {
                questionArea.innerHTML = '<div class="muted">No questions found for this quiz.</div>';
                return;
            }

            const q = quizDto.questions[index];
            quizTitle.textContent = quizDto.title || 'Quiz';
            qCounter.textContent = `Question ${index + 1} of ${quizDto.questions.length}`;

            const selected = ensureSet(q.id);
            const type = q.allowMultiple ? 'checkbox' : 'radio';
            const groupName = `q_${q.id}`;

            const images = (q.images || []);
            const imgHtml = images.length
                ? `<div class="imggrid">${images.map(i => `<img alt="Question image" src="${escapeHtml(i.url || `/uploads/${i.fileName}`)}" />`).join('')}</div>`
                : '';

            const answersHtml = (q.answers || []).map(a => {
                const checked = selected.has(a.id) ? 'checked' : '';
                return `
              <label class="answer">
                <input type="${type}" name="${groupName}" value="${a.id}" ${checked} />
                <div>${escapeHtml(a.text || '')}</div>
              </label>
            `;
            }).join('');

            questionArea.innerHTML = `
            <div>
              <div class="row" style="justify-content: space-between;">
                <div class="qtext">${escapeHtml(q.text || '')}</div>
                <div class="pill">${q.allowMultiple ? 'Multiple answers allowed' : 'Single answer'}</div>
              </div>
              ${imgHtml}
              <div class="answers">${answersHtml}</div>
            </div>
          `;

            const inputs = questionArea.querySelectorAll(`input[name="${groupName}"]`);
            inputs.forEach(inp => {
                inp.addEventListener('change', () => {
                    if (!q.allowMultiple) {
                        selected.clear();
                        selected.add(inp.value);
                    } else {
                        if (inp.checked) selected.add(inp.value);
                        else selected.delete(inp.value);
                    }
                });
            });

            btnPrev.disabled = index === 0;
            btnNext.disabled = index === quizDto.questions.length - 1;
        }

        async function loadQuiz(quizId) {
            setStatus('Loading quiz…');
            resultCard.style.display = 'none';
            perQuestion.innerHTML = '';
            selections.clear();
            index = 0;

            try {
                const raw = await api.randomized(quizId);
                quizDto = normalizeQuiz(raw);
                currentQuizId = quizId;
                if (pickerCard) pickerCard.style.display = 'none';
                quizCard.style.display = 'block';
                btnRestart.disabled = false;
                btnNewQuiz.disabled = true;
                renderQuestion();
                setStatus('');
            } catch (e) {
                quizCard.style.display = 'none';
                btnRestart.disabled = true;
                setStatus('Could not load quiz. Choose a quiz from the list and make sure it still exists.', 'error');
            }
        }

        function buildSubmitPayload() {
            const answers = (quizDto.questions || []).map(q => {
                const set = ensureSet(q.id);
                return {
                    QuestionId: q.id,
                    SelectedAnswerIds: Array.from(set)
                };
            });
            return { Answers: answers };
        }

        async function submitQuiz() {
            if (!currentQuizId || !quizDto) return;

            setStatus('Submitting attempt…');
            try {
                const payload = buildSubmitPayload();
                const res = await api.submit(currentQuizId, payload);

                const pct = res.ScorePercent ?? res.scorePercent ?? 0;
                const cc = res.CorrectCount ?? res.correctCount ?? 0;
                const tq = res.TotalQuestions ?? res.totalQuestions ?? 0;

                resultText.innerHTML = `Score: <strong>${pct}%</strong> — ${cc} / ${tq}`;
                resultDetail.textContent = 'Per-question feedback below (without revealing the correct answers).';

                const resQuestions = res.Questions ?? res.questions ?? [];
                const byQ = new Map(resQuestions.map(x => [x.QuestionId ?? x.questionId, x]));

                const blocks = (quizDto.questions || []).map((q, i) =>
                {
                    const r = byQ.get(q.id);
                    const ok = r?.IsCorrect ?? r?.isCorrect;
                    const cls = ok ? 'ok' : 'bad';
                    const word = ok ? 'Correct' : 'Incorrect';
                    const answered = (r?.SelectedAnswerIds ?? r?.selectedAnswerIds ?? []).length;

                    return `
                    <div class="card" style="margin: 10px 0;">\
                    <div><strong>Q${i + 1}.</strong> ${escapeHtml(q.text || '')}
                    </div>
                    <div class="${cls}" style="margin-top: 6px;">${word}
                    </div>
                    <div class="muted" style="margin-top: 4px;">Selected: ${answered} option(s)
                    </div>
                    </div>
                    `;
                }).join('');

                perQuestion.innerHTML = blocks;
                resultCard.style.display = 'block';
                btnNewQuiz.disabled = false;
                setStatus('');
            } catch (e) {
                setStatus('Submit failed. Check the API response and server logs.', 'error');
            }
        }

        async function refreshQuizListForCategory() {
            try {
                const selectedCategory = categorySelect.value || 'All';
                const quizzes = normalizeQuizList(await api.listQuizzes(selectedCategory));
                fillQuizSelect(quizzes);
            } catch {
                fillQuizSelect([]);
            }
        }

        // UI wiring
        btnLoad.addEventListener('click', () => {
            const id = getSelectedQuizId();
            if (!id) {
                setStatus('Pick a quiz from the dropdown before loading.', 'error');
                return;
            }
            loadQuiz(id);
        });

        btnRestart.addEventListener('click', () => {
            if (!currentQuizId) return;
            loadQuiz(currentQuizId);
        });

        btnPrev.addEventListener('click', () => {
            if (index > 0) {
                index--;
                renderQuestion();
            }
        });

        btnNext.addEventListener('click', () => {
            if (quizDto && index < quizDto.questions.length - 1) {
                index++;
                renderQuestion();
            }
        });

        btnNewQuiz.addEventListener('click', () => {
            // Reset quiz state
            currentQuizId = null;
            quizDto = null;
            index = 0;
            selections.clear();

            // Hide quiz + results
            quizCard.style.display = 'none';
            resultCard.style.display = 'none';

            // Show quiz picker again
            if (pickerCard) pickerCard.style.display = 'block';

            // Reset buttons
            btnRestart.disabled = true;
            btnNewQuiz.disabled = true;
        });

        btnSubmit.addEventListener('click', submitQuiz);

        categorySelect.addEventListener('change', () => {
            refreshQuizListForCategory();
        });

        // Init
        (async function init() {
            try {
                let categories = [];
                try {
                    categories = await api.listCategories();
                } catch {
                    categories = [];
                }
                fillCategorySelect(Array.isArray(categories) ? categories : []);
                await refreshQuizListForCategory();
            } catch {
                fillQuizSelect([]);
            }

            const qid = guidFromQuery();
            if (qid) {
                quizSelect.value = qid;
                loadQuiz(qid);
            }
        })();
    </script>
</body>
</html>
