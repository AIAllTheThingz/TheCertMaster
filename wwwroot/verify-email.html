<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheCertMaster Email Verification</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #d3d6db;
            --panel: rgba(211, 214, 219, 0.9);
            --text: #303841;
            --muted: #3a4750;
            --accent: #be3144;
            --accent-soft: rgba(190, 49, 68, 0.14);
            --border: rgba(48, 56, 65, 0.16);
            --shadow: rgba(48, 56, 65, 0.18);
            --success-bg: #ecfdf3;
            --success-text: #166534;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(190, 49, 68, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(58, 71, 80, 0.24), transparent 26%),
                linear-gradient(180deg, #dfe2e6 0%, var(--bg) 52%, #c5c9cf 100%);
            color: var(--text);
            padding: 1.2rem;
            display: grid;
            place-items: center;
        }

        .panel {
            width: min(828px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 26px;
            box-shadow: 0 26px 54px var(--shadow);
            padding: 1.6rem;
            text-align: center;
        }

        .top-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: center;
            justify-content: center;
            margin: 0 0 1.2rem;
            padding: 0.95rem 1rem;
            background: rgba(232, 234, 237, 0.82);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 18px 36px rgba(48, 56, 65, 0.12);
            backdrop-filter: blur(10px);
        }

        .top-links-label {
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-right: 0.2rem;
        }

        .top-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 0.9rem;
            border-radius: 999px;
            border: 1px solid rgba(48, 56, 65, 0.14);
            background: rgba(238, 240, 243, 0.82);
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .top-link:hover {
            background: rgba(238, 240, 243, 0.98);
            border-color: rgba(190, 49, 68, 0.28);
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 0.9rem;
            padding: 0.35rem 0.8rem;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 0.8rem;
            font-family: Georgia, "Times New Roman", serif;
        }

        p {
            color: var(--muted);
            line-height: 1.7;
        }

        .resend-form {
            display: grid;
            gap: 0.85rem;
            margin-top: 1.25rem;
            text-align: left;
        }

        .resend-form label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
        }

        .resend-form input {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.94);
            color: var(--text);
            font: inherit;
        }

        .resend-form button {
            justify-self: start;
            padding: 0.85rem 1.2rem;
            border-radius: 999px;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .resend-form button:hover {
            background: #0b2d40;
        }

        .tagline {
            color: var(--accent);
            font-weight: 700;
            margin-top: -0.1rem;
        }

        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 16px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e3a8a;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .status.success {
            background: var(--success-bg);
            border-color: #bbf7d0;
            color: var(--success-text);
        }

        .status.error {
            background: var(--error-bg);
            border-color: #fecaca;
            color: var(--error-text);
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div style="width:min(720px, 100%);">
        <nav class="top-links" aria-label="Site pages">
            <span class="top-links-label">Pages</span>
            <a class="top-link" href="/">Home</a>
            <a class="top-link" href="/account.html">Account</a>
            <a class="top-link" href="/quiz.html">Quiz</a>
            <a class="top-link" href="/register.html">Register</a>
            <a class="top-link" href="/result-home.html">Results</a>
            <a class="top-link" href="/verify-email.html">Verify Email</a>
        </nav>
    <section class="panel">
        <div class="eyebrow">TheCertMaster</div>
        <h1>Verify your email</h1>
        <p>Enter your email address to resend your verification email, or open the full verification link from your inbox.</p>

        <form id="resendForm" class="resend-form">
            <div>
                <label for="emailAddress">Email address</label>
                <input id="emailAddress" name="email" type="email" autocomplete="email" required />
            </div>
            <button type="submit">Resend verification email</button>
        </form>

        <div id="status" class="status" role="status" aria-live="polite">Enter your email address above to resend your verification link.</div>

        <div class="links">
            <a href="/">Back to home</a>
        </div>
    </section>
    </div>

    <script>
        const statusBox = document.getElementById("status");
        const resendForm = document.getElementById("resendForm");
        const emailAddress = document.getElementById("emailAddress");

        function setStatus(message, tone = "info") {
            statusBox.className = `status${tone === "info" ? "" : " " + tone}`;
            statusBox.textContent = message;
        }

        function parseApiMessage(text, status, fallbackMessage) {
            if (!text) {
                if (status === 429) return "Too many requests were sent. Please wait a moment and try again.";
                return fallbackMessage || `Request failed with status ${status}.`;
            }

            try {
                const parsed = JSON.parse(text);
                if (typeof parsed === "string" && parsed.trim()) return parsed.trim();
                if (Array.isArray(parsed)) {
                    const messages = parsed
                        .map(item => item?.description || item?.Description || item?.message || item?.Message)
                        .filter(Boolean);
                    if (messages.length) return messages.join("; ");
                }

                return parsed.detail || parsed.title || parsed.message || parsed.Message || text;
            } catch {
                return text;
            }
        }

        async function resendVerification(email) {
            const response = await fetch('/api/auth/resend-verification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const text = await response.text();
            if (!response.ok) {
                throw new Error(parseApiMessage(text, response.status, 'Could not resend verification email.'));
            }

            try {
                const parsed = JSON.parse(text);
                return parsed.message || 'Verification email sent.';
            } catch {
                return text || 'Verification email sent.';
            }
        }

        async function verifyEmail() {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get("userId");
            const code = params.get("code");

            if (!userId || !code) {
                return;
            }

            setStatus("Checking your verification link...");

            try {
                const response = await fetch(`/api/auth/confirm-email?userId=${encodeURIComponent(userId)}&code=${encodeURIComponent(code)}`);
                const text = await response.text();

                if (!response.ok) {
                    setStatus(parseApiMessage(text, response.status, "Email verification failed."), "error");
                    return;
                }

                let message = "Email address verified successfully.";
                try {
                    const parsed = JSON.parse(text);
                    message = parsed.message || message;
                } catch {}

                setStatus(message, "success");
            } catch (error) {
                setStatus(error.message || "Email verification could not be completed right now.", "error");
            }
        }

        resendForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const email = emailAddress.value.trim();
            if (!email) {
                setStatus("Email address is required.", "error");
                return;
            }

            setStatus("Sending a fresh verification email...");

            try {
                const message = await resendVerification(email);
                setStatus(message, "success");
            } catch (error) {
                setStatus(error.message || "Unable to resend the verification email right now.", "error");
            }
        });

        verifyEmail();
    </script>
</body>
</html>
