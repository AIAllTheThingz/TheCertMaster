name: Bug report
description: Report a problem with TheCertMaster behavior, setup, import, or UI flow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please share enough detail for us to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Log in as ...
        3. Upload ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Authentication
        - Quiz runner
        - Quiz import
        - ZIP/images
        - Admin dashboard
        - SMTP/email
        - Documentation
        - Deployment
        - CI/tests
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share your environment details.
      placeholder: |
        OS:
        Browser:
        .NET SDK:
        ASPNETCORE_ENVIRONMENT:
        SQL Server version:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error messages or logs
      description: Paste any relevant console output, API responses, or screenshots.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this report.
          required: true
        - label: I removed any secrets, tokens, passwords, or private data from this report.
          required: true
